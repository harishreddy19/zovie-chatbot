<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Zovie Assistant</title>

<style>

body{
font-family:Segoe UI;
background:#f4f5f7;
margin:0;
}

/* CHAT BUTTON */

#chat-toggle{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
border-radius:50%;
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
border:none;
font-size:26px;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

/* CHAT WINDOW */

#chatbot{
position:fixed;
bottom:100px;
right:25px;
width:380px;
height:650px;
background:white;
border-radius:18px;
display:none;
flex-direction:column;
box-shadow:0 30px 80px rgba(0,0,0,.25);
overflow:hidden;
}

/* HEADER */

#header{
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-left{
display:flex;
gap:10px;
align-items:center;
}

.header-left img{
width:34px;
border-radius:50%;
}

/* MESSAGES */

#messages{
flex:1;
padding:18px;
overflow-y:auto;
background:#f9fafb;
}

/* BOT */

.bot-row{
display:flex;
gap:10px;
margin-bottom:12px;
}

.bot-avatar img{
width:28px;
border-radius:50%;
}

.bot-bubble{
background:#eef2ff;
padding:12px 14px;
border-radius:14px;
max-width:75%;
font-size:14px;
}

/* USER */

.user-bubble{
background:#7c3aed;
color:white;
padding:12px 14px;
border-radius:14px;
margin-left:auto;
margin-bottom:12px;
max-width:75%;
}

/* QUICK BUTTONS */

.quick{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.quick button{
border:1px solid #7c3aed;
background:white;
color:#7c3aed;
padding:6px 12px;
border-radius:18px;
cursor:pointer;
font-size:12px;
}

.quick button:hover{
background:#7c3aed;
color:white;
}

/* INPUT */

#input-area{
display:flex;
gap:8px;
padding:12px;
border-top:1px solid #eee;
}

#user-input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

#send,#mic{
background:#7c3aed;
border:none;
color:white;
padding:10px;
border-radius:50%;
cursor:pointer;
}

/* MIC ANIMATION */

.listening{
animation:pulse 1s infinite;
background:red !important;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* STARS */

.star{
font-size:22px;
cursor:pointer;
color:#ccc;
}

.star.active{
color:gold;
}

.feedback-input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<button id="chat-toggle">💬</button>

<div id="chatbot">

<div id="header">
<div class="header-left">
<img src="/static/assets/logo.png">
<div>
<b>Zovie</b><br>
<small>🤖⚡</small>
</div>
</div>
<span id="close">✕</span>
</div>

<div id="messages"></div>

<div id="input-area">
<button id="mic">🎤</button>
<input id="user-input" placeholder="Ask anything...">
<button id="send">➤</button>
</div>

</div>

<script>

const messages=document.getElementById("messages")
const input=document.getElementById("user-input")
const mic=document.getElementById("mic")

let selectedRating=0

/* SPEECH */

function speak(text){

text=text.replace(/⭐|★/g,"")

speechSynthesis.cancel()

const utter=new SpeechSynthesisUtterance(text)

utter.lang="en-GB"

speechSynthesis.speak(utter)

}

/* BOT MESSAGE */

function bot(text,buttons=[]){

const row=document.createElement("div")
row.className="bot-row"

row.innerHTML=`
<div class="bot-avatar">
<img src="/static/assets/logo.png">
</div>
<div class="bot-bubble">${text}</div>
`

messages.appendChild(row)

if(buttons.length){

const quick=document.createElement("div")
quick.className="quick"

buttons.forEach(b=>{

const btn=document.createElement("button")

if(typeof b==="object"){

btn.innerText=b.text

btn.onclick=()=>{

bot("Opening page...",[])
window.open(b.url,"_blank")

}

}else{

btn.innerText=b
btn.onclick=()=>menuHandler(b)

}

quick.appendChild(btn)

})

row.querySelector(".bot-bubble").appendChild(quick)

}

messages.scrollTop=messages.scrollHeight

speak(text)

}

/* USER */

function user(text){
messages.innerHTML+=`<div class="user-bubble">${text}</div>`
}

/* MAIN MENU */

function mainMenu(){

bot(
"Hello! I'm Zovie, your Zoiko mobile assistant. Please choose a service.",
[
"Zoiko Plans",
"Business Deals",
"Devices",
"Animals & Music",
"About Us",
"Activate SIM",
"Top Up",
"Switch & Save",
"Contact Us",
"Support",
"International Calls",
"Exit"
])

}

/* MENU HANDLER */

function menuHandler(choice){

user(choice)

choice=choice.toLowerCase()

switch(choice){

case "zoiko plans":

bot(
"Zoiko Mobile offers affordable SIM-only plans with 4G and 5G connectivity.",
[
"Student Plans",
"Essential Plans",
"Social Tariff",
"Data Only Plans",
"30 Day Plans",
"Back"
])

break

case "student plans":

bot(
"Our Student Discount Programme helps students save money while staying connected.",
[
{text:"View Student Plans",url:"https://zoikomobile.co.uk/student-discount-programme/"},
"Back"
])

break

case "essential plans":

bot(
"Essential Plans offer exclusive discounts for public sector workers.",
[
{text:"View Essential Plans",url:"https://zoikomobile.co.uk/civilservants/"},
"Back"
])

break

case "social tariff":

bot(
"Social Tariff Plans provide affordable mobile connectivity.",
[
{text:"View Social Tariff Plans",url:"https://zoikomobile.co.uk/social-tariff-plans/"},
"Back"
])

break

case "data only plans":

bot(
"Our Data Only Plans work perfectly for tablets and hotspots.",
[
{text:"View Data Plans",url:"https://zoikomobile.co.uk/data-only-plans/"},
"Back"
])

break

case "30 day plans":

bot(
"Flexible 30 day contracts with fast internet and reliable service.",
[
{text:"View 30 Day Plans",url:"https://zoikomobile.co.uk/30-day-plan/"},
"Back"
])

break

case "business deals":

bot(
"Zoiko Business SIM plans for companies and teams.",
[
{text:"View Business Deals",url:"https://zoikomobile.co.uk/business-deals_sim-only-plans/"},
"Back"
])

break

case "devices":

bot(
"Explore Zoiko devices compatible with our network.",
[
{text:"View Devices",url:"https://zoikomobile.co.uk/devices/"},
"Back"
])

break

case "about us":

bot(
"Zoiko Mobile UK provides affordable SIM-only plans and innovative connectivity.",
[
{text:"Read About Zoiko",url:"https://zoikomobile.co.uk/about-us/"},
"Back"
])

break

case "activate sim":

bot(
"You can activate your Zoiko SIM online quickly.",
[
{text:"Activate SIM",url:"https://zoikomobile.co.uk/activate-your-sim/"},
"Back"
])

break

case "top up":

bot(
"Recharge your Zoiko SIM easily online.",
[
{text:"Top Up",url:"https://zoikomobile.co.uk/recharge/"},
"Back"
])

break

case "switch & save":

bot(
"Switch to Zoiko Mobile and save on monthly plans.",
[
{text:"Switch & Save",url:"https://zoikomobile.co.uk/switch-and-save/"},
"Back"
])

break

case "contact us":

bot(
"Contact Zoiko support for assistance.",
[
{text:"Contact Zoiko",url:"https://zoikomobile.co.uk/contact-us/"},
"Back"
])

break

case "support":

bot(
"Zoiko support helps with billing, SIM activation, and network issues.",
[
{text:"Visit Support",url:"https://zoikomobile.co.uk/support/"},
"Back"
])

break

case "international calls":

bot(
"Call over 80 countries with Zoiko international calling plans.",
[
{text:"International Calling",url:"https://zoikomobile.co.uk/international-calling/"},
"Back"
])

break

case "back":
mainMenu()
break

case "exit":
showRating()
break

}

}

/* RATING */

function showRating(){

bot("Please rate your experience with Zovie.")

const row=document.createElement("div")

row.innerHTML=`

<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>

<div id="feedbackForm" style="display:none">

<input id="name" class="feedback-input" placeholder="Name">
<input id="phone" class="feedback-input" placeholder="Phone">
<input id="email" class="feedback-input" placeholder="Email">
<textarea id="feedback" class="feedback-input" placeholder="Describe your issue"></textarea>

<button onclick="submitFeedback()">Submit</button>

</div>
`

messages.appendChild(row)

const stars=row.querySelectorAll(".star")

stars.forEach((s,i)=>{

s.onclick=()=>{

selectedRating=i+1

stars.forEach(st=>st.classList.remove("active"))

for(let j=0;j<=i;j++) stars[j].classList.add("active")

if(selectedRating>=4){

bot("Thank you for using Zovie.")

}else{

document.getElementById("feedbackForm").style.display="block"

}

}

})

}

/* FEEDBACK */

async function submitFeedback(){

const data={
rating:selectedRating,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
message:document.getElementById("feedback").value
}

await fetch("/feedback/",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

bot("Thank you. A live agent will contact you shortly.")

}

/* SEND */

document.getElementById("send").onclick=()=>{

const text=input.value.trim()

if(!text) return

user(text)

input.value=""

menuHandler(text)

}

/* VOICE */

mic.onclick=()=>{

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="en-GB"

mic.classList.add("listening")

recognition.start()

recognition.onresult=e=>{

mic.classList.remove("listening")

const text=e.results[0][0].transcript

user(text)

menuHandler(text)

}

}

/* START */

document.getElementById("chat-toggle").onclick=()=>{
document.getElementById("chatbot").style.display="flex"
messages.innerHTML=""
mainMenu()
}

document.getElementById("close").onclick=()=>{
document.getElementById("chatbot").style.display="none"
}

</script>

</body>
</html>
