<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Zovie Assistant</title>

<style>

body{
font-family:Segoe UI;
background:#f4f5f7;
margin:0;
}

/* CHAT BUTTON */

#chat-toggle{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
border-radius:50%;
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
border:none;
font-size:26px;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

/* CHAT WINDOW */

#chatbot{
position:fixed;
bottom:100px;
right:25px;
width:380px;
height:650px;
background:white;
border-radius:18px;
display:none;
flex-direction:column;
box-shadow:0 30px 80px rgba(0,0,0,.25);
overflow:hidden;
}

/* HEADER */

#header{
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-left{
display:flex;
gap:10px;
align-items:center;
}

.header-left img{
width:34px;
border-radius:50%;
}

/* MESSAGES */

#messages{
flex:1;
padding:18px;
overflow-y:auto;
background:#f9fafb;
}

/* BOT */

.bot-row{
display:flex;
gap:10px;
margin-bottom:12px;
}

.bot-avatar img{
width:28px;
border-radius:50%;
}

.bot-bubble{
background:#eef2ff;
padding:12px 14px;
border-radius:14px;
max-width:75%;
font-size:14px;
}

/* USER */

.user-bubble{
background:#7c3aed;
color:white;
padding:12px 14px;
border-radius:14px;
margin-left:auto;
margin-bottom:12px;
max-width:75%;
}

/* QUICK BUTTONS */

.quick{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.quick button{
border:1px solid #7c3aed;
background:white;
color:#7c3aed;
padding:6px 12px;
border-radius:18px;
cursor:pointer;
font-size:12px;
}

.quick button:hover{
background:#7c3aed;
color:white;
}

/* INPUT */

#input-area{
display:flex;
gap:8px;
padding:12px;
border-top:1px solid #eee;
}

#user-input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

#send,#mic{
background:#7c3aed;
border:none;
color:white;
padding:10px;
border-radius:50%;
cursor:pointer;
}

/* MIC ANIMATION */

.listening{
animation:pulse 1s infinite;
background:red !important;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* STARS */

.star{
font-size:22px;
cursor:pointer;
color:#ccc;
}

.star.active{
color:gold;
}

.feedback-input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<button id="chat-toggle">💬</button>

<div id="chatbot">

<div id="header">
<div class="header-left">
<img src="/static/assets/logo.png">
<div>
<b>Zovie</b><br>
<small>🤖⚡</small>
</div>
</div>
<span id="close">✕</span>
</div>

<div id="messages"></div>

<div id="input-area">
<button id="mic">🎤</button>
<input id="user-input" placeholder="Ask anything...">
<button id="send">➤</button>
</div>

</div>

<script>

const messages=document.getElementById("messages")
const input=document.getElementById("user-input")
const mic=document.getElementById("mic")

let selectedRating=0

/* SPEECH */

function speak(text){

let clean=text.replace(/⭐|★/g,"")

speechSynthesis.cancel()

const utter=new SpeechSynthesisUtterance(clean)

utter.lang="en-GB"

speechSynthesis.speak(utter)

}

/* BOT MESSAGE */

function bot(text,buttons=[]){

const row=document.createElement("div")
row.className="bot-row"

row.innerHTML=`
<div class="bot-avatar">
<img src="/static/assets/logo.png">
</div>
<div class="bot-bubble">${text}</div>
`

messages.appendChild(row)

if(buttons.length){

const quick=document.createElement("div")
quick.className="quick"

buttons.forEach(b=>{

const btn=document.createElement("button")

if(typeof b==="object"){
btn.innerText=b.text
btn.onclick=()=>window.open(b.url,"_blank")
}else{
btn.innerText=b
btn.onclick=()=>menuHandler(b)
}

quick.appendChild(btn)

})

row.querySelector(".bot-bubble").appendChild(quick)

}

messages.scrollTop=messages.scrollHeight

speak(text)

}

/* USER */

function user(text){
messages.innerHTML+=`<div class="user-bubble">${text}</div>`
}

/* MAIN MENU */

function mainMenu(){

bot(
"Hello! I'm Zovie, your Zoiko mobile assistant. Please select a service.",
[
"Zoiko Plans",
"Business Deals",
"Devices",
"Animals & Music",
"About Us",
"Activate SIM",
"Top Up",
"Switch & Save",
"Contact Us",
"Support",
"International Calls",
"Exit"
])

}

/* MENU */

function menuHandler(choice){

user(choice)

switch(choice){

case "Zoiko Plans":

bot(
"Zoiko Mobile offers affordable SIM-only plans designed for students, professionals, and families. Our plans provide fast 4G/5G connectivity, flexible pricing, and reliable UK coverage. Choose a category below to explore detailed plans and offers.",
[
"Student Plans",
"Essential Plans",
"Social Tariff",
"Data Only Plans",
"30 Day Plans",
"Back"
])

break

case "Student Plans":

bot(
"Our Student Discount Programme helps students save money while staying connected. Students receive special discounts on monthly SIM-only plans and even get a free SIM card when switching networks. It’s designed for students who want reliable service at an affordable price.",
[
{text:"View Student Plans",url:"https://zoikomobile.co.uk/student-discount-programme/"},
"Back"
])

break

case "Essential Plans":

bot(
"Zoiko Essential Plans provide exclusive discounts for public sector workers and their families. These plans offer long-term savings while maintaining premium mobile connectivity and reliable customer support.",
[
{text:"View Essential Plans",url:"https://zoikomobile.co.uk/civilservants/"},
"Back"
])

break

case "Social Tariff":

bot(
"Zoiko Social Tariff Plans are designed for individuals and families looking for affordable mobile connectivity. These plans provide cost-effective mobile services to help bridge the digital divide.",
[
{text:"View Social Tariff Plans",url:"https://zoikomobile.co.uk/social-tariff-plans/"},
"Back"
])

break

case "Data Only Plans":

bot(
"Our Data Only Plans are perfect for tablets, laptops, and mobile hotspots. They offer flexible data packages that allow you to stay connected anywhere without traditional voice plans.",
[
{text:"View Data Plans",url:"https://zoikomobile.co.uk/data-only-plans/"},
"Back"
])

break

case "30 Day Plans":

bot(
"Zoiko 30-Day Plans provide flexible monthly contracts with no long commitments. Enjoy high-speed internet, clear calls, and affordable pricing with the freedom to change plans anytime.",
[
{text:"View 30 Day Plans",url:"https://zoikomobile.co.uk/30-day-plan/"},
"Back"
])

break

case "Business Deals":

bot(
"Zoiko Business Deals provide mobile solutions designed for businesses of all sizes. Companies can benefit from cost-effective SIM plans, strong network coverage, and flexible connectivity for employees.",
[
{text:"Explore Business Deals",url:"https://zoikomobile.co.uk/business-deals_sim-only-plans/"},
"Back"
])

break

case "Devices":

bot(
"Zoiko offers a range of modern smartphones and compatible devices designed to work seamlessly with our mobile network services.",
[
{text:"View Devices",url:"https://zoikomobile.co.uk/devices/"},
"Back"
])

break

case "Animals & Music":

bot(
"Animals & Music is a unique Zoiko experience designed to entertain users while promoting creative digital engagement.",
[
{text:"Explore Animals & Music",url:"https://zoikomobile.co.uk/animals-and-music/"},
"Back"
])

break

case "About Us":

bot(
"Zoiko Mobile UK is part of the Zoiko Communications Group, providing innovative mobile connectivity with affordable SIM-only plans, 5G support, EU roaming, and reliable customer support.",
[
{text:"Read About Zoiko",url:"https://zoikomobile.co.uk/about-us/"},
"Back"
])

break

case "Activate SIM":

bot(
"Activating your Zoiko SIM is simple and quick. Just follow the activation steps online to start using your new mobile plan immediately.",
[
{text:"Activate SIM",url:"https://zoikomobile.co.uk/activate-your-sim/"},
"Back"
])

break

case "Top Up":

bot(
"You can recharge your Zoiko SIM easily using the online top-up portal. Simply select your plan and complete the payment process to continue enjoying uninterrupted service.",
[
{text:"Top Up Now",url:"https://zoikomobile.co.uk/recharge/"},
"Back"
])

break

case "Switch & Save":

bot(
"Switching to Zoiko Mobile allows you to enjoy affordable plans, reliable coverage, and seamless connectivity while saving money on your monthly mobile expenses.",
[
{text:"Switch to Zoiko",url:"https://zoikomobile.co.uk/switch-and-save/"},
"Back"
])

break

case "Contact Us":

bot(
"If you need assistance or have questions about Zoiko services, you can reach our support team through the contact page.",
[
{text:"Contact Zoiko",url:"https://zoikomobile.co.uk/contact-us/"},
"Back"
])

break

case "Support":

bot(
"Zoiko Support provides help with billing, SIM activation, network issues, and general service inquiries.",
[
{text:"Visit Support",url:"https://zoikomobile.co.uk/support/"},
"Back"
])

break

case "International Calls":

bot(
"Zoiko offers international calling to more than 80 countries. Stay connected with family, friends, and colleagues worldwide without worrying about high call costs.",
[
{text:"International Calling Details",url:"https://zoikomobile.co.uk/international-calling/"},
"Back"
])

break

case "Back":
mainMenu()
break

case "Exit":
showRating()
break

}

}

/* RATING */

function showRating(){

bot("Please rate your experience with Zovie.")

const row=document.createElement("div")

row.innerHTML=`

<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>

<div id="feedbackForm" style="display:none">

<input id="name" class="feedback-input" placeholder="Name">
<input id="phone" class="feedback-input" placeholder="Phone">
<input id="email" class="feedback-input" placeholder="Email">
<textarea id="feedback" class="feedback-input" placeholder="Describe your issue"></textarea>

<button onclick="submitFeedback()">Submit</button>

</div>
`

messages.appendChild(row)

const stars=row.querySelectorAll(".star")

stars.forEach((s,i)=>{

s.onclick=()=>{

selectedRating=i+1

stars.forEach(st=>st.classList.remove("active"))

for(let j=0;j<=i;j++) stars[j].classList.add("active")

if(selectedRating>=4){

bot("Thank you for using Zovie. We appreciate your feedback.")

}else{

document.getElementById("feedbackForm").style.display="block"

}

}

})

}

/* FEEDBACK */

async function submitFeedback(){

const data={
rating:selectedRating,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
message:document.getElementById("feedback").value
}

await fetch("/feedback/",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

bot("Thank you. A live agent will contact you shortly.")

}

/* SEND */

document.getElementById("send").onclick=()=>{

const text=input.value.trim()

if(!text) return

user(text)

input.value=""

menuHandler(text)

}

/* VOICE */

mic.onclick=()=>{

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="en-GB"

mic.classList.add("listening")

recognition.start()

recognition.onresult=e=>{

mic.classList.remove("listening")

const text=e.results[0][0].transcript

input.value=text

document.getElementById("send").click()

}

}

/* START */

document.getElementById("chat-toggle").onclick=()=>{
document.getElementById("chatbot").style.display="flex"
messages.innerHTML=""
mainMenu()
}

document.getElementById("close").onclick=()=>{
document.getElementById("chatbot").style.display="none"
}

</script>

</body>
</html>
